name: Hive Catalog Test

on:
  push:
    branches:
      - '**'
      - '!dependabot/**'
    tags:
      - '**'
  pull_request:

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ICEBERG_HOME: /tmp/iceberg

jobs:
  hive-build:
    name: AMD64 Ubuntu 24.04 (HiveCatalog)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout iceberg-cpp
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libboost-all-dev \
            libthrift-dev \
            thrift-compiler
      - name: Configure
        shell: bash
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_INSTALL_PREFIX=${ICEBERG_HOME} \
            -DICEBERG_BUILD_STATIC=ON \
            -DICEBERG_BUILD_SHARED=ON \
            -DICEBERG_BUILD_HIVE=ON \
            -DICEBERG_BUILD_HIVE_INTEGRATION_TESTS=OFF
      - name: Build
        shell: bash
        run: cmake --build build --target install
      - name: Run hive_catalog_test
        shell: bash
        run: ctest --test-dir build --output-on-failure -R 'hive_catalog_test'
      - name: Run full ctest regression
        shell: bash
        run: ctest --test-dir build --output-on-failure
