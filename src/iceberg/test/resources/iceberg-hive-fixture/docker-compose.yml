# Docker Compose stack used by hive_catalog_integration_test.
#
# Brings up two services:
#
#   * `hms` - Apache Hive 4.0 standalone Metastore listening on
#     thrift://localhost:9083 (embedded Derby backing store; data is
#     thrown away on container restart, which is exactly what we want
#     between test runs).
#
#   * `minio` - S3-compatible object storage used as the warehouse for
#     iceberg metadata files. The integration test sets the warehouse
#     to s3://iceberg-warehouse/ and configures the FileIO via the
#     usual AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars.
#
# Bring the stack up with:
#   docker compose -f src/iceberg/test/resources/iceberg-hive-fixture/docker-compose.yml \
#                  -p iceberg-hive-catalog-service up -d
#
# The integration test will start the stack itself via
# `iceberg::DockerCompose` when ICEBERG_BUILD_HIVE_INTEGRATION_TESTS=ON.

services:
  hms:
    image: apache/hive:4.0.0
    container_name: iceberg-cpp-hms
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: derby
    ports:
      - "9083:9083"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2024-08-29T01-40-52Z
    container_name: iceberg-cpp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 30
